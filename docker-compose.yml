services:
  kaji:
    build: .
    container_name: kaji
    restart: unless-stopped
    ports:
      - "8880:80"
      - "8443:443"
      - "8443:443/udp"
      - "8080:8080"
    volumes:
      - kaji_caddy_data:/data
      - kaji_caddy_config:/etc/caddy
      - kaji_gui_config:/etc/caddy-gui
      - kaji_caddy_logs:/var/log/caddy
    read_only: true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    mem_limit: 512m
    tmpfs:
      - /tmp
    environment:
      - CADDY_GUI_MODE=docker
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/api/caddy/status"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  kaji_caddy_data:
  kaji_caddy_config:
  kaji_gui_config:
  kaji_caddy_logs:
