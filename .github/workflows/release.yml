name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - uses: oven-sh/setup-bun@v2

      - name: Build frontend
        run: cd frontend && bun install --frozen-lockfile && bun run build

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Cross-compile Kaji binaries
        env:
          VERSION: ${{ steps.version.outputs.version }}
          LDFLAGS: -X main.version=${{ steps.version.outputs.version }}
        run: |
          platforms=(
            "linux/amd64"
            "linux/arm64"
            "darwin/amd64"
            "darwin/arm64"
          )
          for platform in "${platforms[@]}"; do
            os="${platform%/*}"
            arch="${platform#*/}"
            output="kaji-${os}-${arch}"
            echo "Building ${output}..."
            CGO_ENABLED=0 GOOS="${os}" GOARCH="${arch}" \
              go build -ldflags "${LDFLAGS}" -o "${output}" .
          done

      - name: Read Caddy version
        id: caddy
        run: echo "version=$(cat .caddy-version)" >> "$GITHUB_OUTPUT"

      - name: Install xcaddy
        run: go install github.com/caddyserver/xcaddy/cmd/xcaddy@v0.4.5

      - name: Cross-compile Caddy binaries
        run: |
          set -e
          CADDY_VERSION="${{ steps.caddy.outputs.version }}"
          platforms=(
            "linux/amd64"
            "linux/arm64"
            "darwin/amd64"
            "darwin/arm64"
          )
          for platform in "${platforms[@]}"; do
            os="${platform%/*}"
            arch="${platform#*/}"
            output="caddy-${os}-${arch}"
            echo "Building ${output}..."
            GOOS="${os}" GOARCH="${arch}" xcaddy build "v${CADDY_VERSION}" \
              --with github.com/caddy-dns/cloudflare \
              --output "${output}"
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            kaji-linux-amd64
            kaji-linux-arm64
            kaji-darwin-amd64
            kaji-darwin-arm64
            caddy-linux-amd64
            caddy-linux-arm64
            caddy-darwin-amd64
            caddy-darwin-arm64
