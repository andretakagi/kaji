name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: oven-sh/setup-bun@v2

      # Frontend checks
      - name: Install frontend dependencies
        run: cd frontend && bun install --frozen-lockfile

      - name: Lint frontend
        run: cd frontend && bunx @biomejs/biome check .

      - name: Build frontend
        run: cd frontend && bun run build

      # Backend checks (frontend must build first so dist/ exists for go:embed)
      - name: Check Go formatting
        run: |
          diff=$(gofmt -d .)
          if [ -n "$diff" ]; then
            echo "$diff"
            exit 1
          fi

      - name: Go vet
        run: go vet ./...

      - name: Run tests
        run: go test -race -count=1 ./...

      - name: Build Go binary
        run: go build -ldflags "-X main.version=$(git describe --tags --always)" -o kaji .
