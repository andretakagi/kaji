<!doctype html>
<html lang="en" data-theme="dark">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
		<meta name="color-scheme" content="dark" />
		<meta name="theme-color" content="#1a1d28" />
		<script>
			(() => {
				var t = localStorage.getItem("theme") || "dark";
				document.documentElement.setAttribute("data-theme", t);
				var cs = document.querySelector('meta[name="color-scheme"]');
				if (cs) cs.setAttribute("content", t);
				var tc = document.querySelector('meta[name="theme-color"]');
				if (tc) tc.setAttribute("content", t === "light" ? "#f0edf4" : "#1a1d28");
			})();
		</script>
		<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%234b3a70'/><text x='16' y='24' font-size='22' text-anchor='middle' fill='%23e2dce8' font-family='serif'>舵</text></svg>" />
		<title>Kaji</title>
	</head>
	<body>
		<div id="root"></div>
		<script type="module" src="/src/main.tsx"></script>
	</body>
</html>
